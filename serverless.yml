org: utecalumno
service: api-scraping-igp

provider:
  name: aws
  runtime: python3.12
  memorySize: 1024
  timeout: 20
  iam:
    role: arn:aws:iam::725644124723:role/LabRole 
  environment:
    TABLE_NAME: ${sls:stage}-t_sismos_igp

functions:
  scrape_sismos:
    handler: scraper.lambda_handler
    events:
      - http:
          path: /scrape/igp
          method: get
          cors: true

# Creación automática de la tabla en DynamoDB
resources:
  Resources:
    TablaSismosIGP:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.TABLE_NAME}
        AttributeDefinitions:
          - AttributeName: id_sismo
            AttributeType: S
        KeySchema:
          - AttributeName: id_sismo
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST